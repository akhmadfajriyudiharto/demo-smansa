<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega-Sensus Masa Depan</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input[type="text"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #4285F4; color: white; border: none; border-radius: 4px; }
        button:disabled { background-color: #999; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🚀 Radar Masa Depan Gen Z</h1>

    <div class="card" id="formSensus">
        <h3 id="sapaanSiswa"></h3>
        <p>1. Kalau internet mati sebulan, peran apa yang kamu ambil di sekolah?</p>
        <input type="text" id="q1" placeholder="Jawabanmu...">
        
        <p>2. Pelajaran apa yang pengen kamu hack biar langsung paham?</p>
        <input type="text" id="q2" placeholder="Jawabanmu...">
        
        <p>3. Kalau dikasih 1 Miliar, proyek apa yang pertama kamu buat?</p>
        <input type="text" id="q3" placeholder="Jawabanmu...">
        <br><br>
        <!-- Hapus onclick inline, gunakan event listener di JavaScript -->
        <button id="btnKirim">Pindai Masa Depan!</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Pastikan mengganti ini dengan Config Firebase milikmu yang asli
        const firebaseConfig = { 
            apiKey: "AIzaSyCc3Kr8K7MKZznsTfvpDhxGW-DaenqxGt4", 
            authDomain: "project-18c7f4fc-5196-445e-ab9.firebaseapp.com", 
            projectId: "project-18c7f4fc-5196-445e-ab9" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let namaSiswa = "Siswa Smansa";

        const btnKirim = document.getElementById("btnKirim");

        btnKirim.addEventListener("click", async () => {
            // Gunakan .trim() untuk mencegah spasi kosong dianggap sebagai jawaban
            const krisis = document.getElementById("q1").value.trim();
            const strategi = document.getElementById("q2").value.trim();
            const visi = document.getElementById("q3").value.trim();

            if (!krisis || !strategi || !visi) {
                return alert("Isi semua pertanyaan, ya!");
            }

            // Ubah state tombol agar user tidak klik berkali-kali (spam)
            btnKirim.disabled = true;
            btnKirim.textContent = "Memproses...";

            try {
                // Menyimpan data mentah ke Firestore
                const docRef = await addDoc(collection(db, "input"), {
                    nama: namaSiswa, 
                    krisis: krisis, 
                    strategi: strategi, 
                    visi: visi, 
                    status_proses: "belum", 
                    waktu: serverTimestamp()
                });
                
                // // Memicu alur kerja Google Cloud Workflows via Webhook HTTP POST
                // // Ganti URL di bawah dengan URL Cloud Function atau API Gateway kamu.
                // const webhookUrl = "https://workflowexecutions.googleapis.com/v1/projects/project-18c7f4fc-5196-445e-ab9/locations/asia-southeast2/workflows/sensus-rpg/executions";
                
                // await fetch(webhookUrl, {
                //     method: "POST", 
                //     headers: { "Content-Type": "application/json" },
                //     body: JSON.stringify({ 
                //         id_dokumen: docRef.id, 
                //         nama: namaSiswa, 
                //         krisis: krisis, 
                //         strategi: strategi, 
                //         visi: visi 
                //     })
                // });

                document.getElementById("formSensus").innerHTML = "<h3>✅ Datamu sedang diproses oleh AI! Lihat ke layar proyektor!</h3>";
            } catch (error) { 
                console.error("Error: ", error); 
                alert("Terjadi kesalahan saat mengirim data.");
                btnKirim.disabled = false;
                btnKirim.textContent = "Pindai Masa Depan!";
            }
        });
    </script>
</body>
</html>
